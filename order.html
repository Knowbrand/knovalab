<!DOCTYPE html>
<html>

<head>

<title>Book Your Website</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#f5f5f5,#cfcfcf,#f0f0f0);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:500px;
background:rgba(255,255,255,0.4);
backdrop-filter:blur(18px);
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:30px;
}

label{
font-weight:bold;
}

select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:20px;
border:none;
border-radius:8px;
font-size:15px;
}

button{
width:100%;
padding:15px;
font-size:16px;
background:black;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#333;
}

</style>

</head>

<body>

<div class="container">

<h1>Book Your Website</h1>

<label>Select Plan</label>
<select id="plan">
<option>Basic - ₹2999</option>
<option>Standard - ₹4999</option>
<option>Premium - ₹5999</option>
</select>

<label>Select Industry</label>
<select id="industry">
<option>Restaurant / Cafe</option>
<option>Salon / Spa</option>
<option>Gym / Fitness</option>
<option>Clothing Store</option>
<option>Real Estate</option>
<option>Other</option>
</select>

<label>Extra Needs</label>
<select id="needs">
<option>Photo Gallery</option>
<option>Online Booking</option>
<option>Menu Section</option>
<option>Google Maps</option>
<option>WhatsApp Button</option>
<option>SEO Setup</option>
</select>

<button onclick="sendWhatsApp()">Book via WhatsApp</button>

</div>

<script>

function sendWhatsApp(){

let plan = document.getElementById("plan").value
let industry = document.getElementById("industry").value
let needs = document.getElementById("needs").value

let message =
"Hello KnowBrand!%0A%0A" +
"I want to book a website.%0A%0A" +
"Plan: " + plan + "%0A" +
"Industry: " + industry + "%0A" +
"Needs: " + needs

let phone = "919999999999" // PUT YOUR WHATSAPP NUMBER

let url = "https://wa.me/" + phone + "?text=" + message

window.open(url)

}

</script>

</body>

</html>
