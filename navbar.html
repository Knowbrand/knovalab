<style>
/* ================= NAVBAR ================= */

nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:25px 10%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(15,15,15,0.95);
backdrop-filter:blur(10px);
z-index:5000;
transition:0.3s ease;
border-bottom:1px solid rgba(255,255,255,0.05);
}

nav.shrink{
padding:15px 10%;
background:#0b0b0b;
}

.logo{
font-size:22px;
font-weight:700;
text-decoration:none;
color:white;
}

.nav-links{
display:flex;
gap:35px;
align-items:center;
}

.nav-links a{
color:white;
text-decoration:none;
font-weight:500;
opacity:0.8;
transition:0.3s;
}

.nav-links a:hover{
opacity:1;
color:var(--accent);
}

.demo-btn{
background:var(--accent);
color:white;
padding:10px 22px;
border-radius:30px;
text-decoration:none;
font-weight:600;
transition:0.3s;
}

.demo-btn:hover{
transform:translateY(-2px);
}

/* Hamburger */
.menu-toggle{
display:none;
flex-direction:column;
cursor:pointer;
gap:5px;
}

.menu-toggle span{
width:25px;
height:3px;
background:white;
border-radius:3px;
transition:0.3s;
}

/* ================= MOBILE NAV ================= */

@media(max-width:900px){

.nav-links{
position:absolute;
top:100%;
left:0;
width:100%;
background:#111;
flex-direction:column;
align-items:center;
gap:25px;
padding:30px 0;
display:none;
border-top:1px solid rgba(255,255,255,0.05);
}

.nav-links.active{
display:flex;
}

.menu-toggle{
display:flex;
}

}

</style>

<nav>

<a href="./" class="logo">Knovalab</a>

<div class="nav-links">
<a href="./">Home</a>
<a href="./#services">Services</a>
<a href="./#portfolio">Work</a>
<a href="./pricing/">Pricing</a>
<a href="./faq/">FAQ</a>
<a href="./demo/" class="demo-btn">Book Free Demo</a>
</div>

<div class="menu-toggle">
<span></span>
<span></span>
<span></span>
</div>

</nav>
