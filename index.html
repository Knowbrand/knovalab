<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knovalab | Premium Business Websites</title>

<style>

/* ================= GLOBAL ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#0f0f0f;
color:white;
line-height:1.6;
}

/* IMPORTANT FIX: space for fixed navbar */
body{
padding-top:90px;
}

section{
padding:110px 10%;
}

h1,h2,h3{
font-weight:700;
letter-spacing:-0.5px;
}

p{
opacity:0.75;
}

:root{
--accent:#ff6a00;
}

/* ================= HERO ================= */

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:space-between;
gap:60px;
}

.hero-left{
flex:1;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero p{
font-size:18px;
margin-bottom:35px;
max-width:500px;
}

.hero-buttons{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.btn-primary{
background:var(--accent);
color:white;
padding:15px 30px;
border-radius:40px;
text-decoration:none;
font-weight:600;
transition:0.3s;
}

.btn-primary:hover{
transform:translateY(-3px);
}

.btn-secondary{
border:1px solid #333;
color:white;
padding:15px 30px;
border-radius:40px;
text-decoration:none;
transition:0.3s;
}

.btn-secondary:hover{
background:#1a1a1a;
}

.hero-right{
flex:1;
}

.hero-right img{
width:100%;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* ================= SERVICES ================= */

.services{
background:#141414;
}

.section-title{
text-align:center;
margin-bottom:60px;
font-size:40px;
}

.services-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.service-card{
background:#1a1a1a;
padding:30px;
border-radius:20px;
transition:0.3s;
border:1px solid #222;
}

.service-card:hover{
transform:translateY(-6px);
border-color:var(--accent);
}

.service-card h3{
margin-bottom:12px;
}

/* ================= STATS ================= */

.stats{
background:#0f0f0f;
text-align:center;
}

.stats-grid{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:40px;
}

.stat h3{
font-size:45px;
color:var(--accent);
}

.stat p{
opacity:0.7;
}

/* ================= PORTFOLIO ================= */

.portfolio{
background:#141414;
}

.portfolio-grid{
display:flex;
gap:40px;
flex-wrap:wrap;
justify-content:center;
}

.port-card{
background:#1a1a1a;
padding:20px;
border-radius:20px;
width:360px;
border:1px solid #222;
transition:0.3s;
}

.port-card:hover{
transform:translateY(-5px);
}

.preview{
width:100%;
height:210px;
overflow:hidden;
border-radius:12px;
margin-bottom:15px;
}

.preview iframe{
width:1200px;
height:800px;
transform:scale(0.26);
transform-origin:top left;
pointer-events:none;
border:none;
}

/* ================= FAQ ================= */

.faq-section{
background:#0f0f0f;
}

.faq{
max-width:800px;
margin:auto;
}

.faq-item{
margin-bottom:15px;
}

.faq-item h4{
cursor:pointer;
background:#1a1a1a;
padding:15px;
border-radius:10px;
}

.faq-item p{
display:none;
padding:12px;
opacity:0.7;
}

/* ================= CONTACT ================= */

.contact{
text-align:center;
background:#141414;
}

.contact a{
display:inline-block;
margin-top:25px;
background:var(--accent);
color:white;
padding:15px 30px;
border-radius:30px;
text-decoration:none;
}

/* ================= FOOTER ================= */

footer{
background:#0b0b0b;
padding:70px 10%;
}

.footer-grid{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:40px;
}

footer h4{
margin-bottom:15px;
}

footer p{
opacity:0.6;
margin:6px 0;
}

.copyright{
text-align:center;
margin-top:40px;
opacity:0.5;
}

/* ================= CHATBOT ================= */

.chat-button{
position:fixed;
bottom:20px;
right:20px;
background:var(--accent);
color:white;
padding:14px 18px;
border-radius:40px;
cursor:pointer;
z-index:3000;
}

.chatbox{
position:fixed;
bottom:80px;
right:20px;
width:300px;
background:#1a1a1a;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
display:none;
flex-direction:column;
z-index:3000;
color:white;
}

.chat-header{
background:var(--accent);
padding:12px;
border-radius:15px 15px 0 0;
}

.chat-messages{
padding:15px;
height:220px;
overflow-y:auto;
}

.bot{
background:#222;
padding:10px;
border-radius:10px;
margin-bottom:10px;
font-size:14px;
}

/* ================= MOBILE ================= */

@media(max-width:900px){

.hero{
flex-direction:column;
text-align:center;
}

.hero h1{
font-size:40px;
}

.stats-grid{
flex-direction:column;
}

.port-card{
width:100%;
}

}

</style>
</head>

<body>

<!-- NAVBAR MOUNT POINT -->
<div id="navbar"></div>

<!-- HERO -->
<section class="hero">
<div class="hero-left">
<h1>
Websites Designed<br>
To Turn Visitors<br>
Into Customers.
</h1>

<p>
We build fast, premium, mobile-first websites for businesses that want to grow.
</p>

<div class="hero-buttons">
<a href="#portfolio" class="btn-primary">View Our Work</a>
<a href="/demo/" class="btn-secondary">Book Free Consultation</a>
</div>
</div>

<div class="hero-right">
<img src="https://images.unsplash.com/photo-1559028012-481c04fa702d" alt="Website Preview">
</div>
</section>

<!-- (Everything else unchanged exactly as you had it...) -->

<script>
fetch('navbar.html')
.then(res => res.text())
.then(data => {
document.getElementById('navbar').innerHTML = data;
});

function toggleFAQ(el){
let p=el.nextElementSibling
p.style.display=p.style.display==="block"?"none":"block"
}

function toggleChat(){
const box=document.getElementById("chatbox");
box.style.display=box.style.display==="flex"?"none":"flex";
}
</script>

</body>
</html>
